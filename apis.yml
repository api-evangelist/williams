  - aid: williams:northwest-pipeline
    name: Northwest Pipeline EBB
    description: >-
      Northwest Pipeline is a major interstate natural gas pipeline operated by
      Williams, providing electronic bulletin board access for nominations and
      capacity management on the Northwest Pipeline system serving the Pacific
      Northwest and parts of the western United States.
