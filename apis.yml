aid: williams
name: Williams Companies
description: >-
  Williams Companies is a Fortune 500 energy infrastructure company that operates
  approximately 33,000 miles of natural gas pipeline infrastructure, moving roughly
  one-third of the nation's natural gas. The company's flagship Transco pipeline
  system spans 10,000 miles from south Texas to New York City and is the nation's
  largest-volume natural gas pipeline. Williams provides pipeline transportation,
  gathering, processing, and storage services across key natural gas supply basins
  and serves utilities, power generators, industrial customers, and local distribution
  companies across the United States.
