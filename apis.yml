apis:
  - aid: williams:transco-nominations
    name: Transco Nominations API
    description: >-
      The Transco Nominations API enables natural gas shippers to submit, modify,
      and track pipeline transportation nominations on the Transco pipeline system
      via the 1Line electronic bulletin board portal. Nominations define the quantity
      of gas a shipper wants to transport, the points of injection and withdrawal,
      and the scheduling period. The system supports online screen entry, flat file
      uploads, and EDI-based nomination submission.
    humanURL: https://www.1line.williams.com/Transco/index.html
