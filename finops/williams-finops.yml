description: FinOps shape for Williams is tariff-driven - pipeline transportation rates filed with FERC and invoiced under the shipper's transportation service agreement. The 1Line / EBB system itself is not separately metered as an API; it is the access channel for the underlying tariff service.
sources:
  - https://www.williams.com
  - https://www.1line.williams.com
notes: There is no API price list; cost is the pipeline tariff. Meters describe the actual tariff line items (reserved capacity, transported volume) rather than synthetic API meters.
billingModel:
  pricingCategory: Tariff-Based
  billingFrequency: Monthly
  billingCurrency: USD
  chargeCategories:
    - Usage
    - Purchase
    - Adjustment
focusColumns:
  ServiceName: Williams 1Line Pipeline Service
  ServiceCategory: Energy Infrastructure
  ProviderName: Williams Companies
  PublisherName: The Williams Companies, Inc.
  InvoiceIssuerName: The Williams Companies, Inc.
  BillingCurrency: USD
meters:
  - name: reserved_capacity
    unit: Dth_per_day
    aggregation: max
    dimensions:
      - pipeline
      - rate_schedule
      - receipt_point
      - delivery_point
  - name: transported_volume
    unit: Dth
    aggregation: sum
    dimensions:
      - pipeline
      - rate_schedule
      - cycle
  - name: capacity_release
    unit: Dth_per_day
    aggregation: sum
    dimensions:
      - pipeline
      - rate_schedule
principles:
  - name: Visibility
    description: Reconcile against 1Line nomination, scheduling, and confirmation reports plus the shipper's monthly transportation invoice; FERC-filed tariffs publish the rate schedules.
  - name: Allocation
    description: Allocate by pipeline (Transco / Northwest), rate schedule, and receipt / delivery point pair, matching the tariff's billing keys.
  - name: Optimization
    description: Optimization is contractual - capacity-release auctions, alternate path selection, and cycle timing - not API-call reduction.
  - name: Accountability
    description: Owned by gas-supply / scheduling and treasury; the technical 1Line integration team owns reliability of nominations, not the underlying tariff cost.
