description: Williams Companies operates US natural-gas pipeline infrastructure (Transco, Northwest Pipeline) and exposes shipper-facing systems through 1Line - the FERC-regulated Electronic Bulletin Board / nominations platform. There is no public commercial API price list; access to 1Line and any system-to-system integration requires an active transportation contract / shipper relationship under the pipeline tariff.
sources:
  - https://www.williams.com
  - https://www.1line.williams.com
notes: 1Line / EBB access is regulated and contract-driven (FERC tariff, transportation service agreement) rather than priced as a commercial API. There is no public per-call price; charges are pipeline tariff rates, not API fees. Trimmed to a single Contact Sales plan.
plans:
  - id: williams-contact-sales
    name: Contact Sales
    type: enterprise
    description: 1Line / EBB access for Transco and Northwest Pipeline is granted to active shippers under a transportation service agreement. System-to-system integration is provisioned alongside the shipper contract; rates are governed by the FERC-filed pipeline tariff, not by an API price list.
    entries:
      - label: Shipper Contract Access
        name: shipper_contract_access
        type: flat
        metric: varies
        limit: -1
        timeFrame: usage
        geo: US
        unit: 1
        price: contact sales
        userMultiplied: false
    elements:
      - name: 1Line Electronic Bulletin Board
      - name: Transco Nominations
      - name: Northwest Pipeline EBB
      - name: FERC-Filed Tariff Rates
