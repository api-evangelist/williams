provider: Williams Companies
providerId: williams
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Energy
  - Natural Gas
  - Pipeline
  - Rate Limiting
  - Contact Sales
description: Williams Companies does not publish API rate-limit numbers for 1Line / EBB integrations. Throttling is governed by the operating-procedures section of the pipeline tariff and the shipper's system-to-system access provisioning, not by a public rate-limit doc.
sources:
  - https://www.1line.williams.com
notes: 1Line operates on regulated nomination cycles (timely, evening, ID1, ID2, ID3) under the pipeline tariff; system limits are scoped to those cycles and to per-shipper provisioning, not published as request-rate numbers.
responseCodes:
  throttled: 429
limits:
  - name: Nomination-Cycle Window
    scope: shipper
    metric: nominations_per_cycle
    limit: see FERC tariff / 1Line operating procedures
    notes: Nominations / capacity-release submissions are bound to the FERC-published nomination cycles (timely, evening, ID1, ID2, ID3); system-to-system limits are configured per shipper.
  - name: Per-Shipper System Limits
    scope: shipper
    metric: varies
    limit: see shipper provisioning
    notes: Concurrent connections / call rate are configured at shipper onboarding; not publicly documented.
policies:
  - name: Nomination-Cycle Compliance
    description: Submit nominations within the FERC-defined cycle windows; out-of-cycle submissions are rejected, not throttled.
  - name: Backoff
    description: On transient errors apply standard exponential backoff with jitter; for 1Line outages follow the Operational Flow Order (OFO) / Critical Notice channel.
maintainers:
